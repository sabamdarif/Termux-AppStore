name: Update Apps Metadata
on:
    push:
        paths:
            - "apps/**"
    pull_request:
        paths:
            - "apps/**"
    workflow_dispatch:

# Least privilege by default; the job below only needs to read the tree to
# validate a PR. The write path (releases + push) is exercised on push only.
permissions:
    contents: read

jobs:
    update-metadata:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.10"
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install Pillow
                  pip install pathlib
            - name: Update apps.json
              run: python .github/scripts/update_metadata.py
            - name: Check for changes
              id: check_changes
              run: |
                  if [[ -n "$(git status --porcelain)" ]]; then
                    echo "changes=true" >> $GITHUB_OUTPUT
                  fi
            - name: Create logos archive
              run: |
                  mkdir -p logo
                  for app_dir in apps/*; do
                    if [ -d "$app_dir" ]; then
                      app_name=$(basename "$app_dir")
                      if [ -f "$app_dir/logo.png" ]; then
                        mkdir -p "logo/${app_name}"
                        cp "$app_dir/logo.png" "logo/${app_name}/logo.png"
                      elif [ -f "$app_dir/icon"*.png ]; then
                        mkdir -p "logo/${app_name}"
                        cp "$app_dir/icon"*.png "logo/${app_name}/logo.png"
                      fi
                    fi
                  done
                  cd logo && zip -r ../logos.zip * && cd ..
            - name: Create Logos Release
              if: github.event_name != 'pull_request'
              uses: softprops/action-gh-release@v3
              with:
                  files: logos.zip
                  tag_name: logos
                  name: App Logos
                  body: Archive of all app logos
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Create Apps Data Release
              if: github.event_name != 'pull_request'
              uses: softprops/action-gh-release@v3
              with:
                  files: data/apps.json
                  tag_name: apps_data
                  name: Apps Data
                  body: Apps metadata JSON file
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Commit and push if changed
              if: steps.check_changes.outputs.changes == 'true' && github.event_name != 'pull_request'
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "GitHub Action"
                  BRANCH_NAME=${GITHUB_REF#refs/heads/}
                  git add data/apps.json
                  git diff --quiet && git diff --staged --quiet || (
                    if [ -f updated_apps.txt ]; then
                      APPS_LIST=$(sed 's/^- //' updated_apps.txt | awk -F':' '{print $1}' | paste -sd ", " -)
                      echo "Update: $APPS_LIST" > .git/commit_msg.txt
                      echo "" >> .git/commit_msg.txt
                      cat updated_apps.txt >> .git/commit_msg.txt
                      rm updated_apps.txt
                    else
                      echo "Update apps metadata" > .git/commit_msg.txt
                    fi

                    git commit -F .git/commit_msg.txt

                    # Push via the checkout-persisted credential (G3): never
                    # interpolate github.actor into the remote URL.
                    git push origin "HEAD:$BRANCH_NAME"
                  )
